# Package name and version
PACKAGE_NAME="hello-dkms"
PACKAGE_VERSION="1.0"

# The name of the built module (without .ko extension)
# Should match the object file in Makefile
BUILT_MODULE_NAME[0]="hello"

# Target directory in /lib/modules/<kernel>/
DEST_MODULE_LOCATION[0]="/kernel/drivers/misc"

# Automatically rebuild the module when a new kernel is installed
AUTOINSTALL="yes"
